info:
  description: Schema-driven generative API that orchestrates LLM-powered workflows.
  title: Task API
  version: 3.0.0
openapi: 3.1.0
paths:
  /health:
    get:
      description: Returns server health status.
      operationId: healthCheck
      responses:
        "200":
          content:
            application/json:
              schema:
                properties:
                  status:
                    example: ok
                    type: string
                type: object
          description: Successful response
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Bad request
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Internal server error
      security: []
      summary: Health check
      tags:
        - System
  /v3/artifacts/{id}/status:
    get:
      description: Poll for async artifact generation status. Returns a presigned download URL when the generation is complete.
      operationId: getArtifactStatus
      parameters:
        - description: Artifact generation ID
          in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                properties:
                  error:
                    description: Error message (only when failed)
                    type: string
                  id:
                    type: string
                  mime_type:
                    type: string
                  status:
                    enum:
                      - processing
                      - completed
                      - failed
                    type: string
                  url:
                    description: Presigned download URL (only when completed)
                    type: string
                type: object
          description: Successful response
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Bad request
        "401":
          description: "Unauthorized - missing or invalid API key"
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Internal server error
      summary: Get artifact generation status
      tags:
        - Artifacts
  /v3/call:
    post:
      description: Execute a function by name (passed in the request body). If no cached script exists, one is generated automatically.
      operationId: call
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CallRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunResponse"
          description: Successful response
        "202":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PendingResponse"
          description: Accepted – async operation pending. Poll the status URL in meta.pending_operations.
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Bad request
        "401":
          description: "Unauthorized - missing or invalid API key"
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Internal server error
      summary: Call function by name
      tags:
        - Functions
  /v3/call/stream:
    post:
      description: Execute a function by name (passed in the request body) with SSE streaming output.
      operationId: callStream
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CallRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunResponse"
            text/event-stream:
              schema:
                description: "Server-Sent Events stream. Each event is a JSON object prefixed with 'data: ' and terminated with the '[DONE]' sentinel."
                type: string
          description: Successful response
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Bad request
        "401":
          description: "Unauthorized - missing or invalid API key"
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
          description: Internal server error
      summary: Stream function by name
      tags:
        - Functions
  /v3/compat/chat/completions:
    post:
      description: OpenAI-compatible chat completions endpoint. Supports streaming via the stream parameter.
