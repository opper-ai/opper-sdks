name: Publish

on:
  push:
    branches: [main]

jobs:
  # ─── Detect what changed ───────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      typescript: ${{ steps.filter.outputs.typescript }}
      python: ${{ steps.filter.outputs.python }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            typescript:
              - 'typescript/**'
            python:
              - 'python/**'

  # ─── TypeScript Publish ────────────────────────────────────
  publish-typescript:
    needs: changes
    if: needs.changes.outputs.typescript == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: typescript
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if version changed
        id: version
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          PREVIOUS=$(git show HEAD~1:typescript/package.json 2>/dev/null \
            | node -p "JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).version" \
            2>/dev/null || echo "")
          if [ "$CURRENT" != "$PREVIOUS" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "version=$CURRENT" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.version.outputs.changed == 'true'
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - run: npm ci
        if: steps.version.outputs.changed == 'true'

      - run: npm run build
        if: steps.version.outputs.changed == 'true'

      - run: npm publish
        if: steps.version.outputs.changed == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ─── Python Publish ────────────────────────────────────────
  publish-python:
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if version changed
        id: version
        run: |
          CURRENT=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          PREVIOUS=$(git show HEAD~1:python/pyproject.toml 2>/dev/null \
            | python3 -c "import sys,tomllib; print(tomllib.loads(sys.stdin.read())['project']['version'])" \
            2>/dev/null || echo "")
          if [ "$CURRENT" != "$PREVIOUS" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "version=$CURRENT" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-python@v5
        if: steps.version.outputs.changed == 'true'
        with:
          python-version: "3.12"

      - run: pip install build
        if: steps.version.outputs.changed == 'true'

      - run: python -m build
        if: steps.version.outputs.changed == 'true'

      - uses: pypa/gh-action-pypi-publish@release/v1
        if: steps.version.outputs.changed == 'true'
        with:
          packages-dir: python/dist/
