name: Generate SDK

on:
  repository_dispatch:
    types: [spec-updated]
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download OpenAPI spec from CI artifact
        env:
          GH_TOKEN: ${{ secrets.API_REPO_TOKEN }}
          RUN_ID: ${{ github.event.client_payload.run_id }}
        run: |
          if [ -n "$RUN_ID" ]; then
            gh run download "$RUN_ID" -n openapi-spec -R opper-ai/task-api-poc
          else
            gh run download -n openapi-spec -R opper-ai/task-api-poc
          fi

      - uses: opper-ai/opper-openapi-sdks@v1
        id: generate
        with:
          spec: ./openapi.yaml
          opper-api-key: ${{ secrets.OPPER_API_KEY }}

      - name: Copy generated SDK
        env:
          SDK_DIR: ${{ steps.generate.outputs.sdk-dir }}
        run: |
          rsync -a --delete --exclude .git --exclude .gitignore --exclude .github "$SDK_DIR/" ./typescript/
          rm -f openapi.yaml
          rm -rf sdk/

      - name: Open PR
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.API_REPO_TOKEN }}
          branch: update-sdk
          title: 'chore: update TypeScript SDK from API spec'
          body: |
            Auto-generated from spec change in opper-ai/task-api-poc@${{ github.event.client_payload.sha || 'manual' }}.
          commit-message: 'chore: regenerate TypeScript SDK'
